name: validate-public-artifacts

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test runner
        run: python -m pip install "pytest>=8,<10"
      - name: Compile Python sources
        run: python -m compileall -q experiments tools
      - name: Run analysis tests
        run: python -m pytest experiments/tests -q
      - name: Validate curated repository
        run: python tools/validate_public_repo.py
      - name: Confirm charts are reproducible
        run: |
          python tools/render_result_charts.py
          git diff --exit-code -- assets/final-full-task-results.svg assets/isolated-primitive-results.svg
