<text x="765.3" y="234.0" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="500" fill="#e5e7eb">5/20</text>
<text x="765.3" y="427.0" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="400" fill="#e5e7eb">H=1 + aggregation</text>
<text x="765.3" y="450.0" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="400" fill="#9ca3af">420 calls/episode</text>
<text x="496.0" y="486.0" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="400" fill="#9ca3af">Aggregation matched H=100 success; it did not outperform it (paired McNemar p=1.0)</text>
</svg>
