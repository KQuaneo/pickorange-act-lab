<line x1="487.0" y1="396.0" x2="505.0" y2="396.0" stroke="#f8fafc" stroke-width="2"/>
<text x="496.0" y="384.0" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="500" fill="#e5e7eb">0/20</text>
<text x="496.0" y="427.0" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="400" fill="#e5e7eb">H=1 off</text>
<text x="496.0" y="450.0" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="400" fill="#9ca3af">420 calls/episode</text>
